<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0f1115" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Stopwatch" />
  <title>Stopwatch</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="icon.svg" type="image/svg+xml" />
  <style>
    :root {
      --bg: #0f1115;
      --panel: #181c22;
      --text: #f5f7fb;
      --green: #2cbf5b;
      --yellow: #e3b341;
      --neutral: #d0d7e2;
      --border: rgba(255, 255, 255, 0.12);
      --time-size: clamp(2rem, 8vw, 5rem);
      --label-size: clamp(1rem, 2.2vw, 1.35rem);
      --label-gap: calc(var(--time-size) / 3);
      --button-gap: calc(var(--time-size) / 4);
      --button-height: var(--time-size);
      --label-bottom-pad: calc(var(--label-gap) / 2);
      --time-top-pad: calc(var(--label-gap) / 2);
      --app-max-width: 760px;
      --side-pad: 10px;
    }

    * { box-sizing: border-box; }

    html, body {
      width: 100%;
      min-height: 100%;
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 10px;
    }

    .app {
      width: min(100%, var(--app-max-width));
      display: grid;
      gap: 0;
      background: var(--panel);
      border: 1px solid var(--border);
    }

    .set {
      display: grid;
      gap: 0;
    }

    .set + .set {
      border-top: 1px solid var(--border);
    }

    .label {
      width: 100%;
      min-width: 0;
      height: calc(var(--label-size) + var(--label-bottom-pad));
      padding: 0 var(--side-pad) var(--label-bottom-pad) var(--side-pad);
      border: 0;
      border-bottom: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.03);
      color: var(--text);
      text-align: center;
      font-size: var(--label-size);
      font-weight: 700;
      line-height: 1;
      outline: none;
      cursor: text;
      overflow-wrap: anywhere;
      display: flex;
      align-items: flex-end;
      justify-content: center;
    }

    .time-wrap {
      width: 100%;
      min-width: 0;
      height: calc(var(--time-size) + var(--time-top-pad) + var(--button-gap));
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: var(--time-top-pad) var(--side-pad) var(--button-gap) var(--side-pad);
      border-bottom: 1px solid var(--border);
      overflow: hidden;
      background: rgba(255, 255, 255, 0.02);
    }

    .time {
      width: 100%;
      text-align: center;
      white-space: nowrap;
      line-height: 1;
      letter-spacing: 0.04em;
      font-weight: 800;
      font-variant-numeric: tabular-nums;
      font-size: var(--time-size);
      height: var(--time-size);
      display: flex;
      align-items: center;
      justify-content: center;
      user-select: none;
      -webkit-user-select: none;
    }

    .time-char {
      display: inline-block;
      line-height: 1;
    }

    .add-trigger {
      cursor: pointer;
    }

    .buttons {
      width: 100%;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 0;
    }

    button {
      min-width: 0;
      width: 100%;
      height: var(--button-height);
      border: 0;
      border-right: 1px solid var(--border);
      background: var(--neutral);
      color: #111;
      padding: 0;
      margin: 0;
      font-size: clamp(1rem, 3vw, 1.2rem);
      font-weight: 800;
      line-height: 1;
      cursor: pointer;
      appearance: none;
      -webkit-appearance: none;
    }

    button:last-child {
      border-right: 0;
    }

    button:hover {
      filter: brightness(1.04);
    }

    button:active {
      filter: brightness(0.96);
    }

    .toggle.running {
      background: var(--green);
    }

    .toggle.paused {
      background: var(--yellow);
    }

    .reset,
    .kill,
    .modal-btn {
      background: var(--neutral);
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.58);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .modal-backdrop.open {
      display: flex;
    }

    .modal {
      width: min(100%, 420px);
      background: var(--panel);
      border: 1px solid var(--border);
      color: var(--text);
    }

    .modal-text {
      padding: 16px;
      border-bottom: 1px solid var(--border);
      font-size: 1rem;
      line-height: 1.35;
      text-align: center;
    }

    .modal-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0;
    }

    .modal-btn {
      height: 52px;
      border: 0;
      border-right: 1px solid var(--border);
      color: #111;
      font-size: 1rem;
      font-weight: 800;
      cursor: pointer;
      appearance: none;
      -webkit-appearance: none;
    }

    .modal-btn:last-child {
      border-right: 0;
    }

    @media (max-width: 520px) {
      :root {
        --time-size: clamp(1.55rem, 9vw, 2.8rem);
        --label-size: clamp(0.95rem, 3.6vw, 1.1rem);
        --side-pad: 6px;
      }

      .time {
        letter-spacing: 0.02em;
      }
    }
  </style>
</head>
<body>
  <main id="app" class="app" aria-label="Stopwatch app"></main>

  <div id="confirmModal" class="modal-backdrop" aria-hidden="true">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="confirmTitle">
      <div id="confirmTitle" class="modal-text">Delete this stopwatch?</div>
      <div class="modal-actions">
        <button id="confirmYes" class="modal-btn" type="button">Yes</button>
        <button id="confirmNo" class="modal-btn" type="button">No</button>
      </div>
    </div>
  </div>

  <script>
    const app = document.getElementById('app');
    const confirmModal = document.getElementById('confirmModal');
    const confirmYes = document.getElementById('confirmYes');
    const confirmNo = document.getElementById('confirmNo');

    const MAX_SETS = 5;
    const timers = new Map();
    let nextSetId = 1;
    let nextLabelNumber = 1;
    let pendingDeleteId = null;

    function pad2(num) {
      return String(num).padStart(2, '0');
    }

    function formatTime(msTotal) {
      const hours = Math.floor(msTotal / 3600000);
      const minutes = Math.floor((msTotal % 3600000) / 60000);
      const seconds = Math.floor((msTotal % 60000) / 1000);
      const centiseconds = Math.floor((msTotal % 1000) / 10);
      return `${pad2(hours)}:${pad2(minutes)}:${pad2(seconds)}:${pad2(centiseconds)}`;
    }

    function createTimeDisplay() {
      const time = document.createElement('div');
      time.className = 'time';
      time.setAttribute('aria-label', 'Stopwatch display');
      const chars = [];
      for (const [index, ch] of Array.from(formatTime(0)).entries()) {
        const span = document.createElement('span');
        span.className = 'time-char';
        span.textContent = ch;
        if (index === 0) {
          span.classList.add('add-trigger');
          span.setAttribute('role', 'button');
          span.tabIndex = 0;
          span.title = 'Add stopwatch below';
          span.setAttribute('aria-label', 'Add stopwatch below');
        }
        time.appendChild(span);
        chars.push(span);
      }
      return { time, chars };
    }

    function updateDisplay(state, ms) {
      const text = formatTime(ms);
      for (let i = 0; i < state.displayChars.length; i += 1) {
        state.displayChars[i].textContent = text[i];
      }
    }

    function getElapsed(state) {
      return state.running ? performance.now() - state.startTime + state.elapsedBeforeStart : state.elapsedBeforeStart;
    }

    function render(state) {
      updateDisplay(state, getElapsed(state));
      if (state.running) {
        state.rafId = requestAnimationFrame(() => render(state));
      }
    }

    function syncUI(state) {
      state.toggleBtn.classList.toggle('running', state.running);
      state.toggleBtn.classList.toggle('paused', !state.running);
    }

    function start(state) {
      if (state.running) return;
      state.running = true;
      state.startTime = performance.now();
      syncUI(state);
      cancelAnimationFrame(state.rafId);
      render(state);
    }

    function pause(state) {
      if (!state.running) return;
      state.elapsedBeforeStart += performance.now() - state.startTime;
      state.running = false;
      cancelAnimationFrame(state.rafId);
      updateDisplay(state, state.elapsedBeforeStart);
      syncUI(state);
    }

    function toggle(state) {
      if (state.running) pause(state);
      else start(state);
    }

    function reset(state) {
      state.elapsedBeforeStart = 0;
      if (state.running) {
        state.startTime = performance.now();
        cancelAnimationFrame(state.rafId);
        render(state);
      } else {
        cancelAnimationFrame(state.rafId);
        updateDisplay(state, 0);
      }
      syncUI(state);
    }

    function kill(state) {
      if (!state.running && state.elapsedBeforeStart === 0) {
        requestDelete(state.id);
        return;
      }
      state.running = false;
      state.elapsedBeforeStart = 0;
      cancelAnimationFrame(state.rafId);
      updateDisplay(state, 0);
      syncUI(state);
    }

    function cleanLabel(labelEl, fallback) {
      const cleaned = labelEl.textContent.replace(/\s+/g, ' ').trim();
      labelEl.textContent = cleaned || fallback;
    }

    function insertPlainText(event) {
      event.preventDefault();
      const text = (event.clipboardData || window.clipboardData).getData('text');
      if (document.queryCommandSupported && document.queryCommandSupported('insertText')) {
        document.execCommand('insertText', false, text);
        return;
      }
      const selection = window.getSelection();
      if (!selection || !selection.rangeCount) return;
      selection.deleteFromDocument();
      selection.getRangeAt(0).insertNode(document.createTextNode(text));
      selection.collapseToEnd();
    }

    function createStopwatchSet(insertAfterEl = null) {
      if (timers.size >= MAX_SETS) return null;

      const id = nextSetId += 1;
      const defaultLabel = `stopwatch${nextLabelNumber}`;
      nextLabelNumber += 1;

      const setEl = document.createElement('section');
      setEl.className = 'set';
      setEl.dataset.id = String(id);

      const labelEl = document.createElement('div');
      labelEl.className = 'label';
      labelEl.contentEditable = 'true';
      labelEl.spellcheck = false;
      labelEl.setAttribute('aria-label', 'Stopwatch name');
      labelEl.textContent = defaultLabel;

      const timeWrap = document.createElement('div');
      timeWrap.className = 'time-wrap';
      const { time, chars } = createTimeDisplay();
      timeWrap.appendChild(time);

      const buttons = document.createElement('div');
      buttons.className = 'buttons';

      const toggleBtn = document.createElement('button');
      toggleBtn.className = 'toggle paused';
      toggleBtn.type = 'button';
      toggleBtn.setAttribute('aria-label', 'Toggle');
      toggleBtn.textContent = 'T';

      const resetBtn = document.createElement('button');
      resetBtn.className = 'reset';
      resetBtn.type = 'button';
      resetBtn.setAttribute('aria-label', 'Reset');
      resetBtn.textContent = 'R';

      const killBtn = document.createElement('button');
      killBtn.className = 'kill';
      killBtn.type = 'button';
      killBtn.setAttribute('aria-label', 'Kill');
      killBtn.textContent = 'K';

      buttons.append(toggleBtn, resetBtn, killBtn);
      setEl.append(labelEl, timeWrap, buttons);

      if (insertAfterEl && insertAfterEl.parentNode === app) {
        insertAfterEl.insertAdjacentElement('afterend', setEl);
      } else {
        app.appendChild(setEl);
      }

      const state = {
        id,
        el: setEl,
        labelEl,
        displayChars: chars,
        toggleBtn,
        resetBtn,
        killBtn,
        running: false,
        startTime: 0,
        elapsedBeforeStart: 0,
        rafId: null,
        defaultLabel
      };

      timers.set(id, state);
      updateDisplay(state, 0);
      syncUI(state);

      toggleBtn.addEventListener('click', () => toggle(state));
      resetBtn.addEventListener('click', () => reset(state));
      killBtn.addEventListener('click', () => kill(state));

      chars[0].addEventListener('click', () => addBelow(id));
      chars[0].addEventListener('keydown', (event) => {
        if (event.key === 'Enter' || event.key === ' ') {
          event.preventDefault();
          addBelow(id);
        }
      });

      labelEl.addEventListener('keydown', (event) => {
        if (event.key === 'Enter') {
          event.preventDefault();
          labelEl.blur();
        }
      });

      labelEl.addEventListener('blur', () => cleanLabel(labelEl, state.defaultLabel));
      labelEl.addEventListener('paste', insertPlainText);

      return state;
    }

    function addBelow(id) {
      if (timers.size >= MAX_SETS) return;
      const current = timers.get(id);
      if (!current) return;
      createStopwatchSet(current.el);
    }

    function requestDelete(id) {
      if (timers.size <= 1) return;
      pendingDeleteId = id;
      confirmModal.classList.add('open');
      confirmModal.setAttribute('aria-hidden', 'false');
      confirmYes.focus();
    }

    function closeDeletePrompt() {
      pendingDeleteId = null;
      confirmModal.classList.remove('open');
      confirmModal.setAttribute('aria-hidden', 'true');
    }

    function confirmDelete() {
      if (pendingDeleteId === null || timers.size <= 1) {
        closeDeletePrompt();
        return;
      }
      const state = timers.get(pendingDeleteId);
      if (!state) {
        closeDeletePrompt();
        return;
      }
      cancelAnimationFrame(state.rafId);
      state.el.remove();
      timers.delete(pendingDeleteId);
      closeDeletePrompt();
    }

    confirmYes.addEventListener('click', confirmDelete);
    confirmNo.addEventListener('click', closeDeletePrompt);
    confirmModal.addEventListener('click', (event) => {
      if (event.target === confirmModal) closeDeletePrompt();
    });
    window.addEventListener('keydown', (event) => {
      if (event.key === 'Escape' && confirmModal.classList.contains('open')) {
        closeDeletePrompt();
      }
    });

    createStopwatchSet();

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js').catch(() => {});
      });
    }
  </script>
</body>
</html>
