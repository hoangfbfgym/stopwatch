<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0f1115" />
  <title>Stopwatch</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="icon.svg" type="image/svg+xml" />
  <style>
    :root {
      --bg: #0f1115;
      --panel: #191d24;
      --text: #f5f7fb;
      --green: #2cbf5b;
      --yellow: #e3b341;
      --red: #d94b4b;
      --button-text: #111;
      --border: rgba(255, 255, 255, 0.08);
      --shadow: 0 20px 50px rgba(0, 0, 0, 0.35);
    }

    * { box-sizing: border-box; }

    html, body {
      width: 100%;
      min-height: 100%;
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(180deg, #0d1014 0%, #141922 100%);
      color: var(--text);
    }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: clamp(10px, 2vw, 24px);
    }

    .app {
      width: min(100%, 760px);
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: clamp(16px, 2vw, 28px);
      box-shadow: var(--shadow);
      padding: clamp(14px, 2.5vw, 28px);
      display: grid;
      gap: clamp(12px, 2vw, 20px);
    }

    .top-row {
      display: flex;
      justify-content: center;
      align-items: center;
      min-width: 0;
    }

    .label {
      max-width: 100%;
      padding: 0.22em 0.6em;
      border-radius: 12px;
      text-align: center;
      font-size: clamp(1rem, 2.3vw, 1.45rem);
      font-weight: 700;
      color: var(--text);
      background: rgba(255,255,255,0.04);
      border: 1px solid transparent;
      cursor: text;
      overflow-wrap: anywhere;
      outline: none;
      min-width: 0;
    }

    .label:hover,
    .label:focus {
      border-color: rgba(255,255,255,0.18);
      background: rgba(255,255,255,0.07);
    }

    .time-wrap {
      width: 100%;
      display: grid;
      place-items: center;
      padding: clamp(10px, 1.8vw, 16px);
      border-radius: clamp(16px, 2vw, 24px);
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      overflow: hidden;
    }

    .time {
      width: 100%;
      text-align: center;
      font-weight: 800;
      letter-spacing: 0.05em;
      line-height: 1;
      font-variant-numeric: tabular-nums;
      font-size: clamp(2rem, 9vw, 5.4rem);
      white-space: nowrap;
    }

    .buttons {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: clamp(8px, 1.8vw, 14px);
      flex-wrap: nowrap;
    }

    button {
      width: clamp(64px, 14vw, 88px);
      aspect-ratio: 1 / 1;
      min-width: 0;
      border: none;
      border-radius: clamp(12px, 1.4vw, 16px);
      padding: 0;
      display: grid;
      place-items: center;
      font-size: clamp(0.82rem, 1.8vw, 1rem);
      font-weight: 800;
      text-align: center;
      cursor: pointer;
      transition: transform 0.08s ease, filter 0.15s ease;
      color: var(--button-text);
      user-select: none;
      line-height: 1.1;
    }

    button:hover { filter: brightness(1.04); }
    button:active { transform: translateY(1px) scale(0.995); }

    .toggle.running { background: var(--green); }
    .toggle.paused { background: var(--yellow); }
    .reset { background: #d0d7e2; }
    .kill { background: var(--red); color: #fff; }

    @media (max-width: 420px) {
      .app { padding: 12px; }
      .time { font-size: clamp(1.55rem, 10vw, 2.4rem); letter-spacing: 0.02em; }
      .buttons { gap: 6px; }
      button { width: clamp(56px, 22vw, 72px); font-size: 0.78rem; }
    }
  </style>
</head>
<body>
  <main class="app">
    <div class="top-row">
      <div id="label" class="label" contenteditable="true" spellcheck="false" aria-label="Stopwatch name">stopwatch1</div>
    </div>

    <section class="time-wrap" aria-label="Stopwatch display">
      <div id="display" class="time">00:00:00:00</div>
    </section>

    <div class="buttons">
      <button id="toggleBtn" class="toggle paused" type="button">Toggle</button>
      <button id="resetBtn" class="reset" type="button">Reset</button>
      <button id="killBtn" class="kill" type="button">Kill</button>
    </div>
  </main>

  <script>
    const display = document.getElementById('display');
    const toggleBtn = document.getElementById('toggleBtn');
    const resetBtn = document.getElementById('resetBtn');
    const killBtn = document.getElementById('killBtn');
    const label = document.getElementById('label');

    let running = false;
    let startTime = 0;
    let elapsedBeforeStart = 0;
    let rafId = null;

    function pad2(num) {
      return String(num).padStart(2, '0');
    }

    function formatTime(msTotal) {
      const hours = Math.floor(msTotal / 3600000);
      const minutes = Math.floor((msTotal % 3600000) / 60000);
      const seconds = Math.floor((msTotal % 60000) / 1000);
      const centiseconds = Math.floor((msTotal % 1000) / 10);
      return `${pad2(hours)}:${pad2(minutes)}:${pad2(seconds)}:${pad2(centiseconds)}`;
    }

    function getElapsed() {
      return running ? (performance.now() - startTime + elapsedBeforeStart) : elapsedBeforeStart;
    }

    function render() {
      display.textContent = formatTime(getElapsed());
      if (running) rafId = requestAnimationFrame(render);
    }

    function syncUI() {
      toggleBtn.classList.toggle('running', running);
      toggleBtn.classList.toggle('paused', !running);
    }

    function start() {
      if (running) return;
      running = true;
      startTime = performance.now();
      syncUI();
      cancelAnimationFrame(rafId);
      render();
    }

    function pause() {
      if (!running) return;
      elapsedBeforeStart += performance.now() - startTime;
      running = false;
      cancelAnimationFrame(rafId);
      display.textContent = formatTime(elapsedBeforeStart);
      syncUI();
    }

    function toggle() {
      running ? pause() : start();
    }

    function reset() {
      elapsedBeforeStart = 0;
      if (running) {
        startTime = performance.now();
        display.textContent = formatTime(0);
        cancelAnimationFrame(rafId);
        render();
      } else {
        display.textContent = formatTime(0);
      }
      syncUI();
    }

    function kill() {
      running = false;
      elapsedBeforeStart = 0;
      cancelAnimationFrame(rafId);
      display.textContent = formatTime(0);
      syncUI();
    }

    toggleBtn.addEventListener('click', toggle);
    resetBtn.addEventListener('click', reset);
    killBtn.addEventListener('click', kill);

    label.addEventListener('keydown', (event) => {
      if (event.key === 'Enter') {
        event.preventDefault();
        label.blur();
      }
    });

    label.addEventListener('blur', () => {
      const cleaned = label.textContent.replace(/\s+/g, ' ').trim();
      label.textContent = cleaned || 'stopwatch1';
    });

    label.addEventListener('paste', (event) => {
      event.preventDefault();
      const text = (event.clipboardData || window.clipboardData).getData('text');
      document.execCommand('insertText', false, text);
    });

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js').catch(() => {});
      });
    }

    display.textContent = formatTime(0);
    syncUI();
  </script>
</body>
</html>
