<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0f1115" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Stopwatch" />
  <title>Stopwatch</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="icon.svg" type="image/svg+xml" />
  <style>
    :root {
      --bg: #0f1115;
      --panel: #181c22;
      --text: #f5f7fb;
      --green: #2cbf5b;
      --yellow: #e3b341;
      --neutral: #d0d7e2;
      --border: rgba(255, 255, 255, 0.12);
      --time-size: clamp(2rem, 8vw, 5rem);
      --label-size: clamp(1rem, 2.2vw, 1.35rem);
      --label-gap: calc(var(--time-size) / 3);
      --button-gap: calc(var(--time-size) / 4);
      --button-height: var(--time-size);
      --label-bottom-pad: calc(var(--label-gap) / 2);
      --time-top-pad: calc(var(--label-gap) / 2);
      --app-max-width: 760px;
      --side-pad: 10px;
    }

    * { box-sizing: border-box; }

    html, body {
      width: 100%;
      min-height: 100%;
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 10px;
    }

    .app {
      width: min(100%, var(--app-max-width));
      display: grid;
      gap: 0;
      background: var(--panel);
      border: 1px solid var(--border);
    }

    .label {
      width: 100%;
      min-width: 0;
      height: calc(var(--label-size) + var(--label-bottom-pad));
      padding: 0 var(--side-pad) var(--label-bottom-pad) var(--side-pad);
      border: 0;
      border-bottom: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.03);
      color: var(--text);
      text-align: center;
      font-size: var(--label-size);
      font-weight: 700;
      line-height: 1;
      outline: none;
      cursor: text;
      overflow-wrap: anywhere;
      display: flex;
      align-items: flex-end;
      justify-content: center;
    }

    .time-wrap {
      width: 100%;
      min-width: 0;
      height: calc(var(--time-size) + var(--time-top-pad) + var(--button-gap));
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: var(--time-top-pad) var(--side-pad) var(--button-gap) var(--side-pad);
      border-bottom: 1px solid var(--border);
      overflow: hidden;
      background: rgba(255, 255, 255, 0.02);
    }

    .time {
      width: 100%;
      text-align: center;
      white-space: nowrap;
      line-height: 1;
      letter-spacing: 0.04em;
      font-weight: 800;
      font-variant-numeric: tabular-nums;
      font-size: var(--time-size);
      height: var(--time-size);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .buttons {
      width: 100%;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 0;
    }

    button {
      min-width: 0;
      width: 100%;
      height: var(--button-height);
      border: 0;
      border-right: 1px solid var(--border);
      background: var(--neutral);
      color: #111;
      padding: 0;
      margin: 0;
      font-size: clamp(1rem, 3vw, 1.2rem);
      font-weight: 800;
      line-height: 1;
      cursor: pointer;
      appearance: none;
      -webkit-appearance: none;
    }

    button:last-child {
      border-right: 0;
    }

    button:hover {
      filter: brightness(1.04);
    }

    button:active {
      filter: brightness(0.96);
    }

    .toggle.running {
      background: var(--green);
    }

    .toggle.paused {
      background: var(--yellow);
    }

    .reset,
    .kill {
      background: var(--neutral);
    }

    @media (max-width: 520px) {
      :root {
        --time-size: clamp(1.55rem, 9vw, 2.8rem);
        --label-size: clamp(0.95rem, 3.6vw, 1.1rem);
        --side-pad: 6px;
      }

      .time {
        letter-spacing: 0.02em;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <div id="label" class="label" contenteditable="true" spellcheck="false" aria-label="Stopwatch name">stopwatch1</div>

    <section class="time-wrap" aria-label="Stopwatch display">
      <div id="display" class="time">00:00:00:00</div>
    </section>

    <div class="buttons">
      <button id="toggleBtn" class="toggle paused" type="button" aria-label="Toggle">T</button>
      <button id="resetBtn" class="reset" type="button" aria-label="Reset">R</button>
      <button id="killBtn" class="kill" type="button" aria-label="Kill">K</button>
    </div>
  </main>

  <script>
    const display = document.getElementById('display');
    const toggleBtn = document.getElementById('toggleBtn');
    const resetBtn = document.getElementById('resetBtn');
    const killBtn = document.getElementById('killBtn');
    const label = document.getElementById('label');

    let running = false;
    let startTime = 0;
    let elapsedBeforeStart = 0;
    let rafId = null;

    function pad2(num) {
      return String(num).padStart(2, '0');
    }

    function formatTime(msTotal) {
      const hours = Math.floor(msTotal / 3600000);
      const minutes = Math.floor((msTotal % 3600000) / 60000);
      const seconds = Math.floor((msTotal % 60000) / 1000);
      const centiseconds = Math.floor((msTotal % 1000) / 10);
      return `${pad2(hours)}:${pad2(minutes)}:${pad2(seconds)}:${pad2(centiseconds)}`;
    }

    function getElapsed() {
      return running ? performance.now() - startTime + elapsedBeforeStart : elapsedBeforeStart;
    }

    function render() {
      display.textContent = formatTime(getElapsed());
      if (running) rafId = requestAnimationFrame(render);
    }

    function syncUI() {
      toggleBtn.classList.toggle('running', running);
      toggleBtn.classList.toggle('paused', !running);
    }

    function start() {
      if (running) return;
      running = true;
      startTime = performance.now();
      syncUI();
      cancelAnimationFrame(rafId);
      render();
    }

    function pause() {
      if (!running) return;
      elapsedBeforeStart += performance.now() - startTime;
      running = false;
      cancelAnimationFrame(rafId);
      display.textContent = formatTime(elapsedBeforeStart);
      syncUI();
    }

    function toggle() {
      running ? pause() : start();
    }

    function reset() {
      elapsedBeforeStart = 0;
      if (running) {
        startTime = performance.now();
        cancelAnimationFrame(rafId);
        render();
      } else {
        display.textContent = formatTime(0);
      }
      syncUI();
    }

    function kill() {
      running = false;
      elapsedBeforeStart = 0;
      cancelAnimationFrame(rafId);
      display.textContent = formatTime(0);
      syncUI();
    }

    toggleBtn.addEventListener('click', toggle);
    resetBtn.addEventListener('click', reset);
    killBtn.addEventListener('click', kill);

    label.addEventListener('keydown', (event) => {
      if (event.key === 'Enter') {
        event.preventDefault();
        label.blur();
      }
    });

    label.addEventListener('blur', () => {
      const cleaned = label.textContent.replace(/\s+/g, ' ').trim();
      label.textContent = cleaned || 'stopwatch1';
    });

    label.addEventListener('paste', (event) => {
      event.preventDefault();
      const text = (event.clipboardData || window.clipboardData).getData('text');
      document.execCommand('insertText', false, text);
    });

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js').catch(() => {});
      });
    }

    display.textContent = formatTime(0);
    syncUI();
  </script>
</body>
</html>
